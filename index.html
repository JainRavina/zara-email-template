<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zara Email</title>
</head>

<body style="margin:0; padding:0; background:#f5f5f5;">

  <!-- Outer Wrapper -->
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#f5f5f5;">
    <tr>
      <td align="center">

        <!-- Main Container -->
        <table width="100%" cellpadding="0" cellspacing="0" style="max-width:600px; background:#ffffff;">

          <!-- Header -->
          <tr>
            <td align="center" style="padding:40px 20px 20px 20px;">
              <table cellpadding="0" cellspacing="0">
                <tr>
                  <td align="center" style="
                    font-family: Georgia, serif;
                    font-size: 32px;
                    letter-spacing: 6px;
                    color: #2b2b2b;
                  ">
                    ZARA</td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Image -->
          <tr>
            <td align="center">
              <img src="images/header 1.jpg"
                style="display:block; width:100%; max-width:600px; height:auto;" alt="Zara Sale Banner">
            </td>
          </tr>

          <!-- Heading -->
          <tr>
            <td align="center" style="padding:30px 15px 10px 15px;">
              <table width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td align="center" style="
                    font-family: Georgia, serif;
                    font-size: 22px;
                    letter-spacing: 2px;
                    color: #2b2b2b;
                  ">
                    MID-SEASON SALE
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Subtext -->
          <tr>
            <td align="center" style="padding:10px 15px 30px 15px;">
              <table width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td align="center" style="
                    font-family: Arial, sans-serif;
                    font-size: 15px;
                    color: #555555;
                  ">
                    Up to 50% Off
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- CTA Button -->
          <tr>
            <td align="center" style="padding:10px 15px 40px 15px;">

              <table cellpadding="0" cellspacing="0">
                <tr>
                  <td align="center" bgcolor="#000000" style="padding:12px 28px;">

                    <a href="https://www.zara.com" target="_blank" style="
            display:inline-block;
            font-family: Arial, sans-serif;
            font-size: 14px;
            color: #ffffff;
            text-decoration: none;
          ">
                      SHOP NOW
                    </a>

                  </td>
                </tr>
              </table>

            </td>
          </tr>

          <!-- Description -->
          <tr>
            <td align="center" style="padding:0 20px 30px 20px;">

              <table width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td align="center" style="
          font-family: Arial, sans-serif;
          font-size: 14px;
          color: #777777;
          line-height: 20px;
        ">
                    Discover timeless pieces at exclusive prices.
                  </td>
                </tr>
              </table>

            </td>
          </tr>

          <!-- Divider -->
          <tr>
            <td align="center" style="padding:10px 20px;">
              <table width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td style="border-top:1px solid #eaeaea;"></td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td align="center" style="padding:20px;">

              <table cellpadding="0" cellspacing="0">
                <tr>
                  <td align="center" style="
          font-family: Arial, sans-serif;
          font-size: 12px;
          color: #999999;
        ">
                    © 2026 ZARA<br>
                    Unsubscribe | Privacy Policy
                  </td>
                </tr>
              </table>

            </td>
          </tr>
        </table>

      </td>
    </tr>
  </table>

</body>

</html>
